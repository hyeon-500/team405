<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 기반 차량 환경 관제 시스템</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        header { background: #2c3e50; color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .search-area input { padding: 8px; font-size: 16px; border-radius: 4px; border: none; }
        .search-area button { padding: 8px 15px; font-size: 16px; border-radius: 4px; border: none; cursor: pointer; background: #3498db; color: white; font-weight: bold; }
        .search-area button:hover { background: #2980b9; }

        /* 전체 차량 뷰 격자 레이아웃 */
        #all-vehicles-view { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .vehicle-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 200px; text-align: center; }
        .vehicle-card h3 { margin: 0 0 10px 0; color: #333; }
        .speed-text { font-size: 24px; font-weight: bold; color: #2c3e50; }
        
        /* 위험도 색상 라벨 */
        .risk-SAFE { color: #27ae60; font-weight: bold; }
        .risk-WARNING { color: #f39c12; font-weight: bold; }
        .risk-DANGER { color: #c0392b; font-weight: bold; animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }

        /* 개별 차량 뷰 (초기엔 숨김) */
        #single-vehicle-view { display: none; background: white; padding: 20px; border-radius: 8px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .info-panel { text-align: center; margin-bottom: 20px; padding: 15px; background: #ecf0f1; border-radius: 8px; }
        .info-panel p { margin: 5px 0; font-size: 16px; }
        .chart-container { width: 100%; max-width: 900px; margin: 0 auto; }

        /* DANGER 팝업 스타일 */
        #danger-popup { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #e74c3c; color: white; padding: 15px 30px; border-radius: 8px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; }
    </style>
</head>
<body>

    <!-- DANGER 발생 시 띄울 팝업 박스 -->
    <div id="danger-popup">🚨 [차량 <span id="danger-vid"></span>] 치명적 위험(DANGER) 감지! 즉시 확인 요망!</div>

    <header>
        <h2>🚗 통합 관제 대시보드</h2>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="차량 번호 입력 (예: 1234)">
            <button onclick="searchVehicle()">검색</button>
            <button onclick="showAllVehicles()" style="background: #e67e22;">전체 보기</button>
        </div>
    </header>

    <!-- 1. 전체 차량 보기 영역 -->
    <div id="all-vehicles-view">
        <!-- 차량 카드가 동적으로 추가됩니다. -->
    </div>

    <!-- 2. 개별 차량 상세 보기 영역 -->
    <div id="single-vehicle-view">
        <h2 id="single-title" style="text-align: center;">차량 상세 정보</h2>
        
        <!-- 💡 새롭게 추가된 상세 관제 패널 (날씨, 위험도, 안내 메시지) -->
        <div class="info-panel">
            <h2>현재 위험도: <span id="single-risk">-</span></h2>
            <p><strong>☁️ 현재 환경:</strong> <span id="single-weather">-</span></p>
            <p><strong>📢 관제 안내:</strong> <span id="single-alert" style="font-weight:bold;">-</span></p>
        </div>

        <div class="chart-container">
            <canvas id="sensorChart"></canvas>
        </div>
    </div>

    <script>
        const socket = io();
        let currentMode = 'ALL'; 
        let chartInstance = null; 

        // 1. 차트 초기화 함수
        function initChart() {
            const ctx = document.getElementById('sensorChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [], 
                    datasets: [
                        { label: '속도 (km/h)', borderColor: '#3498db', data: [], fill: false, yAxisID: 'y' },
                        { label: '온도 (℃)', borderColor: '#e74c3c', data: [], fill: false, yAxisID: 'y' },
                        { label: '습도 (%)', borderColor: '#2ecc71', data: [], fill: false, yAxisID: 'y' },
                        { label: '조도 (lux)', borderColor: '#f39c12', data: [], fill: false, yAxisID: 'y1' }
                    ]
                },
                options: { 
                    responsive: true, 
                    animation: false,
                    scales: {
                        y: { type: 'linear', display: true, position: 'left' },
                        y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false } }
                    }
                }
            });
        }

        // 2. 개별 차량 검색
        function searchVehicle() {
            const vid = document.getElementById('searchInput').value.trim();
            if (!vid) {
                alert("차량 번호를 입력해주세요.");
                return;
            }
            currentMode = 'SINGLE';
            document.getElementById('all-vehicles-view').style.display = 'none';
            document.getElementById('single-vehicle-view').style.display = 'block';
            document.getElementById('single-title').innerText = `[${vid}]번 차량 상세 관제`;
            
            document.getElementById('single-risk').innerText = "-";
            document.getElementById('single-weather').innerText = "-";
            document.getElementById('single-alert').innerText = "-";
            initChart();

            socket.emit('subscribe_vehicle', vid); 
        }

        // 3. 전체 보기
        function showAllVehicles() {
            currentMode = 'ALL';
            document.getElementById('searchInput').value = '';
            document.getElementById('all-vehicles-view').style.display = 'flex';
            document.getElementById('single-vehicle-view').style.display = 'none';
            socket.emit('subscribe_vehicle', ''); 
        }

        // 4. 소켓 데이터 수신 메인 처리
        socket.on('sensor_update', (data) => {
            const vid = data.vehicle_id;
            const risk = String(data.predicted_risk).replace(/['\[\]\s]+/g, ''); 
            
            // 💡 [안전장치 추가] raw 데이터가 아예 없을 때 에러가 나지 않도록 빈 객체 {} 할당
            const raw = data.raw_sensor_data || {}; 
            const speed = raw.speed || raw.current_speed || 0; 

            if (currentMode === 'ALL') {
                updateAllVehiclesView(vid, risk, speed);
            } else if (currentMode === 'SINGLE') {
                updateSingleVehicleView(data, risk, speed);
            }
        });

        // 5. 전체 보기 화면 업데이트
        function updateAllVehiclesView(vid, risk, speed) {
            const container = document.getElementById('all-vehicles-view');
            let card = document.getElementById('card-' + vid);

            if (!card) {
                card = document.createElement('div');
                card.className = 'vehicle-card';
                card.id = 'card-' + vid;
                card.innerHTML = `
                    <h3>차량 ID: ${vid}</h3>
                    <div class="speed-text"><span class="speed-val">0</span> km/h</div>
                    <div class="risk-text">위험도: <span class="risk-val"></span></div>
                `;
                container.appendChild(card);
            }
            card.querySelector('.speed-val').innerText = speed;
            card.querySelector('.risk-val').className = `risk-val risk-${risk}`;
            card.querySelector('.risk-val').innerText = risk;

            if (risk === 'DANGER') {
                const dangerPopup = document.getElementById('danger-popup');
                document.getElementById('danger-vid').innerText = vid;
                dangerPopup.style.display = 'block';
                setTimeout(() => { dangerPopup.style.display = 'none'; }, 3000);
            }
        }

        // 6. 개별 보기 화면 (그래프) 업데이트
        function updateSingleVehicleView(data, risk, speed) { 
            const raw = data.raw_sensor_data || {};
            const mapped = data.mapped_features || {};
            const time = new Date().toLocaleTimeString();

            const riskSpan = document.getElementById('single-risk');
            riskSpan.className = `risk-${risk}`;
            riskSpan.innerText = risk;

            // 💡 [안전장치 추가] 맵핑 데이터가 비어있어도 화면이 멈추지 않도록 처리
            const weather = mapped.mapped_weather || '데이터 없음';
            const surface = mapped.mapped_surface || '데이터 없음';
            const mTime = mapped.mapped_time || '데이터 없음';
            
            document.getElementById('single-weather').innerText = 
                `기상: ${weather} / 노면: ${surface} / 시간대: ${mTime}`;

            const alertSpan = document.getElementById('single-alert');
            if (risk === 'DANGER') {
                alertSpan.innerText = "치명적 위험! 즉시 50km/h 이하로 크게 감속하세요!";
                alertSpan.style.color = "#c0392b";
            } else if (risk === 'WARNING') {
                alertSpan.innerText = "주의 구간! 서행하세요.";
                alertSpan.style.color = "#f39c12";
            } else {
                alertSpan.innerText = "안전 운행 구간입니다.";
                alertSpan.style.color = "#27ae60";
            }

            if (!chartInstance) return; // 차트가 렌더링되기 전이면 패스

            const labels = chartInstance.data.labels;
            const speedData = chartInstance.data.datasets[0].data;
            const tempData = chartInstance.data.datasets[1].data;  
            const humData = chartInstance.data.datasets[2].data;   
            const luxData = chartInstance.data.datasets[3].data;   

            labels.push(time);
            speedData.push(speed); 
            tempData.push(raw.temp || 0);
            humData.push(raw.humidity || 0);
            luxData.push(raw.lux || 0);

            if (labels.length > 15) {
                labels.shift();
                speedData.shift();
                tempData.shift();
                humData.shift();
                luxData.shift();
            }
            chartInstance.update();
        }

        window.onload = () => { showAllVehicles(); };
    </script>
</body>
</html>
